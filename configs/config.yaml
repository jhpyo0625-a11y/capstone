# Every knob lives here (spec §5). Code must read these values via coilvision.config —
# never hardcode paths, hyperparameters, or thresholds.

paths:
  dataset_dir: Coil-image-Dataset      # RAW data — read-only, never modified
  incoming_dir: incoming
  quarantine_dir: quarantine
  artifacts_dir: artifacts
  cache_dir: artifacts/cache
  manifests_dir: artifacts/manifests
  models_dir: models
  production_dir: models/production

data:
  classes: [Pass, Dent, Loose]
  expected_width: 2448
  expected_height: 2048
  # Filename fields (run/part#/shot#/code) are provenance metadata ONLY — never
  # model inputs or label logic (spec §2). run is also the split-grouping key.
  filename_pattern: '^(?P<run>\d{6}_\d{6})_A35W_(?P<part>\d+)-(?P<shot>\d+)\s*\[(?P<code>\d+)\]\.bmp$'

preprocess:
  version: 1                            # bump on any preprocessing change; cache + POINTER.json key on it
  # Measured 2026-07-11: red OSD text occupies rows 1822-1858 (cols <= ~650) at
  # 2048 height. 0.125 keeps rows 0-1791, a 30px margin above the text.
  # (Spec originally assumed ~8% — that would NOT have removed the text.)
  osd_crop_bottom_frac: 0.125
  red_text:                             # leakage detector: pure-red OSD pixels (text is RGB 255,0,0)
    r_min: 170
    g_max: 50
    b_max: 50
  roi:
    # Texture-density detector: the winding is the only dense fine-stripe coppery
    # region. Tuned visually on both layouts 2026-07-11 (aspect 2.6-3.3, area
    # 0.14-0.19 across 8 diverse samples).
    det_width: 1224                     # detection at 1/2 scale (wire pitch ~3px here)
    hue_max: 25                         # copper/orange hues (OpenCV H 0-180)
    sat_min: 40
    val_min: 90
    highpass_sigma: 2.0                 # band-pass: |gray - blur(gray, sigma)|
    density_sigma: 18                   # local texture-energy pooling
    peak_frac: 0.35                     # region-grow threshold relative to density peak
    center_region: {x0: 0.10, x1: 0.90, y0: 0.15, y1: 0.85}
    min_area_frac: 0.02
    max_area_frac: 0.30
    min_aspect: 1.2
    max_aspect: 6.0
    max_width_frac: 0.80                # wider than this = grabbed the whole board strip
    pad_frac: 0.15
    fallback_crop: {x0: 0.05, x1: 0.95, y0: 0.20, y1: 0.72}
  # [width, height] letterbox target. Rectangular, matched to the coil's ~2.7
  # aspect (2026-07-12): squares at 384 downscaled the winding pitch to ~1.2px
  # (below Nyquist) — defect texture was aliased away and the model learned
  # session shortcuts instead (val fail-AUC dropped BELOW 0.5, runs 231842/234510).
  resize: [768, 288]

split:
  group_by: run                         # NEVER split per-image (spec §6.2)
  version: 1                            # test_v1 is frozen once approved; bumping = deliberate re-baseline
  # Deterministic exhaustive search over run combinations — no RNG. A combo is
  # feasible if it meets the min_* constraints, keeps every class fraction inside
  # class_frac_window, and never exhausts a layout (train keeps >=1 run of each).
  # Best combo = per-class image fractions closest to class_frac_target.
  test:
    n_runs: [6]
    min_dent_runs: 2
    min_loose_runs: 2
    min_pass_images: 50
    min_layouts: 2
    class_frac_target: 0.18
    class_frac_window: [0.10, 0.28]
  val:                                  # fractions are of the pool remaining after test removal
    n_runs: [4, 5, 6]
    min_dent_runs: 1
    min_loose_runs: 1
    min_pass_images: 40
    min_layouts: 1
    class_frac_target: 0.20
    class_frac_window: [0.10, 0.35]

train:
  backbone: efficientnet_b0
  fallback_backbone: convnext_tiny
  batch_size: 16
  # per_image: (x - mean) / std over the whole image, channels joint (hue is
  # preserved, per-session exposure is removed). imagenet = fixed RGB stats.
  normalize: per_image
  stage1: {lr: 3.0e-3, epochs: 3}       # head only
  stage2: {lr: 1.0e-4, max_epochs: 30}  # full network, cosine decay
  early_stop_patience: 5                # on val (fail-AUC, macro-F1) — threshold-free; recall alone is gamed by all-fail
  seed: 42
  augment:                              # train only; NO hue shifts (copper color is signal)
    hflip_p: 0.5
    vflip_p: 0.5
    rotate_deg: 5
    brightness: 0.15
    contrast: 0.15
    rrc_scale: [0.90, 1.00]             # slight random-resized-crop

anomaly:
  # PatchCore-style experiment (2026-07-12): NN patch-feature distance to a
  # memory bank of train-split Pass images. No training loop. Scores are
  # masked to winding patches (off-coil board patches score high on unfamiliar
  # runs for the wrong reason — run anomaly_20260712_073206).
  backbone: resnet50
  out_indices: [2, 3]                   # stride-8 + stride-16 feature maps
  # Own hi-res cache (coexists with the classifier cache via the config
  # fingerprint): at 768 wide a stride-8 patch spans ~3.3 wire pitches — too
  # coarse for one-wire deviations; at 1536 it spans ~1.6.
  resize: [1536, 576]
  proj_dim: 256                         # fixed-seed Gaussian random projection
  patches_per_image: 400                # sampled into the bank per Pass image
  bank_size: 30000
  top_k: 10                             # image score = mean of top-k patch distances
  batch_size: 2
  seed: 42

eval:
  fail_recall_target: 0.95              # primary gate metric; macro-F1 tiebreak

gate:
  # promote iff candidate fail-recall >= production AND candidate macro-F1 > production
  require_fail_recall_not_worse: true
  require_macro_f1_better: true

retrain:
  min_new_images: 50
  max_days_between: 7
